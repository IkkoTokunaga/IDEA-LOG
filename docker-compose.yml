services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-dev
    container_name: portfolio-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    tty: true
    stdin_open: true

volumes:
  node_modules:
  next_cache:
